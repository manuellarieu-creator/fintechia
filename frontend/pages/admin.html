<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Connexion | NovaBanque</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0F172A;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }
        .login-box {
            background: #1E293B;
            border: 1px solid #334155;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .logo div {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: #3B82F6;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px;
        }
        .logo span {
            font-size: 18px; font-weight: 700;
        }
        .field {
            margin-bottom: 20px;
        }
        .field label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #94A3B8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .field input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0F172A;
            color: #fff;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }
        .field input:focus {
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #3B82F6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: #2563EB;
        }
        .error-msg {
            color: #EF4444;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo">
            <div>N</div>
            <span>NovaBanque Admin</span>
        </div>
        <form id="admin-login-form">
            <div id="step-1">
                <div class="field">
                    <label>ID Client / Email</label>
                    <input type="text" id="admin-id" required placeholder="Saisissez votre identifiant">
                </div>
                <div class="field">
                    <label>Mot de passe</label>
                    <input type="password" id="admin-pwd" required placeholder="Saisissez votre mot de passe">
                </div>
                <button type="submit" class="btn-login">Continuer</button>
            </div>
            <div id="step-2" style="display: none;">
                <div class="field">
                    <label>Code d'authentification (2FA)</label>
                    <input type="text" id="admin-2fa" placeholder="Ex: 123456">
                </div>
                <button type="submit" class="btn-login" id="btn-submit-2fa">Accéder à la console</button>
            </div>
            <div id="login-error" class="error-msg">Identifiants incorrects.</div>
        </form>
    </div>

    <script>
        let tempToken = null;
        const API_BASE = '/api';

        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('login-error');
            errorDiv.style.display = 'none';

            if (!tempToken) {
                // Etape 1
                const id = document.getElementById('admin-id').value;
                const pwd = document.getElementById('admin-pwd').value;
                try {
                    const res = await fetch(`${API_BASE}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ idClient: id, password: pwd })
                    });
                    
                    let data;
                    try { data = await res.json(); } catch(parseErr) {
                        errorDiv.innerText = `Erreur serveur (HTTP ${res.status}). Réessayez.`;
                        errorDiv.style.display = 'block';
                        return;
                    }
                    
                    if (res.ok && (data.require2FA || data.tempToken)) {
                        tempToken = data.tempToken;
                        document.getElementById('step-1').style.display = 'none';
                        document.getElementById('step-2').style.display = 'block';
                        document.getElementById('admin-2fa').required = true;
                    } else if (res.ok && data.token) {
                        checkRoleAndRedirect(data.token, errorDiv);
                    } else {
                        errorDiv.innerText = data.error || `Erreur (HTTP ${res.status})`;
                        errorDiv.style.display = 'block';
                    }
                } catch (err) {
                    console.error('Login fetch error:', err);
                    errorDiv.innerText = "Erreur réseau : " + (err.message || "Impossible de joindre le serveur.");
                    errorDiv.style.display = 'block';
                }
            } else {
                // Etape 2
                const code = document.getElementById('admin-2fa').value;
                try {
                    const res = await fetch(`${API_BASE}/auth/login/2fa`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ tempToken, code })
                    });
                    
                    let data;
                    try { data = await res.json(); } catch(parseErr) {
                        errorDiv.innerText = `Erreur serveur (HTTP ${res.status}). Réessayez.`;
                        errorDiv.style.display = 'block';
                        return;
                    }
                    
                    if (res.ok && data.token) {
                        checkRoleAndRedirect(data.token, errorDiv);
                    } else {
                        errorDiv.innerText = data.error || `Erreur (HTTP ${res.status})`;
                        errorDiv.style.display = 'block';
                    }
                } catch (err) {
                    console.error('2FA fetch error:', err);
                    errorDiv.innerText = "Erreur réseau : " + (err.message || "Impossible de joindre le serveur.");
                    errorDiv.style.display = 'block';
                }
            }
        });

        function checkRoleAndRedirect(token, errorDiv) {
            const payload = JSON.parse(atob(token.split('.')[1]));
            if (payload.role === 'admin') {
                localStorage.setItem('fintech_token', token);
                window.location.href = 'admin-dashboard.html';
            } else {
                errorDiv.innerText = "Accès refusé. Vous n'êtes pas administrateur.";
                errorDiv.style.display = 'block';
                tempToken = null;
                document.getElementById('step-1').style.display = 'block';
                document.getElementById('step-2').style.display = 'none';
                document.getElementById('admin-2fa').required = false;
            }
        }
    </script>
</body>
</html>
